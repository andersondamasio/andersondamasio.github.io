name: Inserir Adsense

on:
  workflow_dispatch: # Executa apenas manualmente

jobs:
  inserir-amp-ads-pro:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório completo com LFS
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Listar todos os arquivos após checkout
        run: ls -R

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm ci

      - name: Inserir AMP Ads nos artigos
        run: node inserir-amp-ads.js

      - name: Rebuild e auditoria SEO
        run: npm run seo:maintain

      - name: Commitar alterações
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A -- . ':(exclude)node_modules/**'
          if git diff --cached --quiet; then
            echo "Nada para commitar"
          else
            git commit -m "Inserido AMP Ads automático com otimização"
            git push
          fi
