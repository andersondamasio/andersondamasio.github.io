name: gerar-e-commitar

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: gerar-e-commitar
  cancel-in-progress: true

jobs:
  gerar-e-commitar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependências do sistema para o Sharp
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Chromium para Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Gerar conteúdo com ChatGPT
        run: node gerar-conteudo.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Rebuild e auditoria SEO
        run: npm run seo:maintain

      - name: Commitar alterações
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A -- . ':(exclude)node_modules/**'
          if git diff --cached --quiet; then
            echo "Nada para commitar, encerrando."
          else
            git commit -m "Novo artigo com SEO validado"
            git push origin HEAD:main
          fi
